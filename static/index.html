<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticagem - Processador de Romaneios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 40px 48px;
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: .875rem;
      color: #666;
      margin-bottom: 32px;
    }

    .field { margin-bottom: 24px; }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .file-drop {
      border: 2px dashed #c8d0e0;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }

    .file-drop:hover, .file-drop.dragover {
      border-color: #4f6ef7;
      background: #f5f7ff;
    }

    .file-drop input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-icon { font-size: 1.6rem; margin-bottom: 6px; }

    .file-hint {
      font-size: .8rem;
      color: #888;
      margin-top: 4px;
    }

    .file-name {
      font-size: .85rem;
      font-weight: 600;
      color: #4f6ef7;
      margin-top: 6px;
      word-break: break-all;
    }

    button[type=submit] {
      width: 100%;
      padding: 14px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    button[type=submit]:hover { background: #3a56d4; }
    button[type=submit]:active { transform: scale(.98); }
    button[type=submit]:disabled { background: #aab4c8; cursor: not-allowed; }

    #status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .875rem;
      display: none;
    }

    #status.processing { background: #fffbe6; color: #856404; border: 1px solid #ffc107; }
    #status.error      { background: #ffeaea; color: #c0392b; border: 1px solid #e74c3c; }
    #status.success    { background: #eafaf1; color: #1e8449; border: 1px solid #2ecc71; }

    #download-link {
      display: none;
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s;
    }

    #download-link:hover { background: #1e8449; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #856404;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ticagem — Expedição</h1>
    <p class="subtitle">Gera o arquivo de ticagem a partir do VUUPT do dia e do ticagem do dia anterior.</p>

    <form id="form">
      <div class="field">
        <label>1 — Arquivo VUUPT do dia (vuuptddmm.TXT)</label>
        <div class="file-drop" id="drop-txt">
          <input type="file" id="txt-file" accept=".txt,.TXT" required>
          <div class="file-icon">📄</div>
          <div>Clique ou arraste o arquivo <strong>.TXT</strong></div>
          <div class="file-hint">ex: vuupt2505.TXT</div>
          <div class="file-name" id="txt-name"></div>
        </div>
      </div>

      <div class="field">
        <label>2 — Ticagem do dia anterior (ticagemddmm.xlsm / .xlsx)</label>
        <div class="file-drop" id="drop-xlsx">
          <input type="file" id="xlsx-file" accept=".xlsx,.xlsm" required>
          <div class="file-icon">📊</div>
          <div>Clique ou arraste o arquivo <strong>.xlsx / .xlsm</strong></div>
          <div class="file-hint">ex: ticagem2205.xlsm</div>
          <div class="file-name" id="xlsx-name"></div>
        </div>
      </div>

      <button type="submit" id="btn-process">Processar</button>
    </form>

    <div id="status"></div>
    <a id="download-link" href="#" download>⬇ Baixar ticagem gerada</a>
  </div>

  <script>
    const txtInput  = document.getElementById('txt-file');
    const xlsxInput = document.getElementById('xlsx-file');
    const txtName   = document.getElementById('txt-name');
    const xlsxName  = document.getElementById('xlsx-name');
    const status    = document.getElementById('status');
    const dlLink    = document.getElementById('download-link');
    const btn       = document.getElementById('btn-process');

    txtInput.addEventListener('change',  () => txtName.textContent  = txtInput.files[0]?.name  || '');
    xlsxInput.addEventListener('change', () => xlsxName.textContent = xlsxInput.files[0]?.name || '');

    // Drag-and-drop visual feedback
    ['drop-txt', 'drop-xlsx'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('dragover'); });
      el.addEventListener('dragleave', () => el.classList.remove('dragover'));
      el.addEventListener('drop',      () => el.classList.remove('dragover'));
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();

      dlLink.style.display = 'none';
      setStatus('processing', '<span class="spinner"></span> Processando…');
      btn.disabled = true;

      const fd = new FormData();
      fd.append('txt_file',  txtInput.files[0]);
      fd.append('prev_xlsx', xlsxInput.files[0]);

      try {
        const resp = await fetch('/process', { method: 'POST', body: fd });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          throw new Error(err.detail || 'Erro desconhecido.');
        }

        const blob = await resp.blob();
        const cdHeader = resp.headers.get('content-disposition') || '';
        const fnMatch  = cdHeader.match(/filename="([^"]+)"/);
        const filename = fnMatch ? fnMatch[1] : 'ticagem.xlsx';

        const url = URL.createObjectURL(blob);
        dlLink.href     = url;
        dlLink.download = filename;
        dlLink.textContent = `⬇ Baixar ${filename}`;
        dlLink.style.display = 'block';

        const count = parseInt(resp.headers.get('x-record-count') || '0', 10);
        setStatus('success', `✔ Concluído! ${count ? count + ' romaneios processados.' : 'Arquivo gerado com sucesso.'}`);
      } catch (err) {
        setStatus('error', '✖ ' + err.message);
      } finally {
        btn.disabled = false;
      }
    });

    function setStatus(cls, html) {
      status.className = cls;
      status.innerHTML = html;
      status.style.display = 'block';
    }
  </script>
</body>
</html>
